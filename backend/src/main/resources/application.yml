server:
  port: 8080

spring:
  application:
    name: myfavor-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/myfavor_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# JWT 配置
jwt:
  secret: myfavorSecretKeyForJwtTokenGeneration2024VeryLongSecretKey
  expiration: 86400000  # 24小时

# 文件上传配置
file:
  upload:
    path: ./uploads/
    allowed-types: image/jpeg,image/png,image/gif,image/webp

# 日志配置
logging:
  level:
    com.myfavor: DEBUG
    org.hibernate.SQL: DEBUG
