<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <h1 class="auth-title">登录</h1>
        <p class="auth-subtitle">欢迎回到手办阁</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input
            type="text"
            formControlName="username"
            class="form-control"
            [class.error]="submitted && f['username'].invalid"
            placeholder="请输入用户名"
          />
          <div
            *ngIf="submitted && f['username'].invalid"
            class="form-error"
          >
            请输入用户名
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input
            type="password"
            formControlName="password"
            class="form-control"
            [class.error]="submitted && f['password'].invalid"
            placeholder="请输入密码"
          />
          <div
            *ngIf="submitted && f['password'].invalid"
            class="form-error"
          >
            请输入密码
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg btn-block"
          [disabled]="loading"
        >
          <span *ngIf="loading" class="spinner-small"></span>
          {{ loading ? '登录中...' : '登录' }}
        </button>
      </form>

      <div class="auth-footer">
        还没有账号？<a routerLink="/register">立即注册</a>
      </div>
    </div>

    <div class="auth-side">
      <div class="side-content">
        <div class="side-icon">🏛️</div>
        <h2 class="side-title">手办阁</h2>
        <p class="side-desc">
          个人手办电子橱窗<br />
          分享你的收藏世界
        </p>
        <div class="side-features">
          <div class="feature-item">
            <span class="feature-icon">🖼️</span>
            <span>展示你的手办收藏</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">❤️</span>
            <span>点赞喜欢的手办</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">⭐</span>
            <span>标记想要的手办</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
